name: Monitor de Precios Falabella

on:
  schedule:
    - cron: '*/30 * * * *'  # cada 30 minutos
  workflow_dispatch:          # permite correrlo manualmente desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Chromium
        run: python -m playwright install chromium --with-deps

      - name: Correr monitor
        env:
          NTFY_TEMA: ${{ secrets.NTFY_TEMA }}
          URLS: ${{ secrets.URLS }}
        run: python monitor.py --once

      - name: Mantener repo activo (evita que GitHub desactive el cron)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > ultimo_chequeo.txt
          git add ultimo_chequeo.txt
          git diff --staged --quiet || git commit -m "ultimo chequeo: $(date -u)"
          git push
